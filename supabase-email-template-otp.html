<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Your Email</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f7f7f5;
      color: #111827;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="background: #f7f7f5; padding: 32px 12px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 640px;
              background: #ffffff;
              border: 1px solid #eceae4;
            "
          >
            <tr>
              <td style="padding: 34px 40px 14px; text-align: center">
                <img
                  src="LOGO_PNG_URL_HERE"
                  alt="Lumixia"
                  width="180"
                  style="
                    display: block;
                    width: 180px;
                    max-width: 100%;
                    height: auto;
                    margin: 0 auto;
                    border: 0;
                    outline: none;
                    text-decoration: none;
                  "
                />
              </td>
            </tr>

            <tr>
              <td style="padding: 12px 40px 0; text-align: center">
                <h1
                  style="
                    margin: 0;
                    color: #111827;
                    font-size: 24px;
                    line-height: 1.25;
                    font-weight: 700;
                    letter-spacing: -0.02em;
                  "
                >
                  Verify your email address
                </h1>
              </td>
            </tr>

            <tr>
              <td style="padding: 18px 40px 0; text-align: center">
                <p
                  style="
                    margin: 0;
                    color: #374151;
                    font-size: 16px;
                    line-height: 1.75;
                    font-weight: 400;
                  "
                >
                  Please enter the verification code to confirm your email address:
                </p>
              </td>
            </tr>

            <tr>
              <td style="padding: 30px 44px 0">
                <div
                  style="
                    background: #f5f5f4;
                    border: 1px solid #ebe8e1;
                    padding: 28px 20px;
                    text-align: center;
                  "
                >
                  <div
                    style="
                      color: #111827;
                      font-size: 32px;
                      line-height: 1;
                      font-weight: 700;
                      letter-spacing: 0.18em;
                    "
                  >
                    {{ .Token }}
                  </div>
                </div>
              </td>
            </tr>

            <tr>
              <td style="padding: 26px 40px 36px">
                <p
                  style="
                    margin: 0;
                    color: #374151;
                    font-size: 16px;
                    line-height: 1.75;
                    text-align: center;
                  "
                >
                  If you didn't request this verification code, please ignore this email.
                </p>
              </td>
            </tr>

            <tr>
              <td
                style="
                  border-top: 1px solid #eceae4;
                  padding: 20px 24px;
                  text-align: left;
                  color: #6b7280;
                  font-size: 14px;
                  line-height: 1.5;
                "
              >
                &copy; 2026 Lumixia
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
